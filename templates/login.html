<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - BaseLIR</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-700 to-teal-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">
    <div class="text-center mb-8">
      {% if logo %}
      <img src="/uploads/{{ logo }}" alt="Logo société"
           class="h-16 mx-auto mb-4 object-contain">
      {% else %}
      <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-100 rounded-full mb-4">
        <svg class="w-8 h-8 text-teal-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
        </svg>
      </div>
      {% endif %}
      <h1 class="text-2xl font-bold text-gray-800">BaseLIR</h1>
      <p class="text-gray-500 text-sm mt-1">Gestion des Habilitations</p>
      {% if ldap_enabled %}
      <span class="inline-block mt-2 text-xs px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full">
        Connexion Active Directory activée
      </span>
      {% endif %}
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Identifiant</label>
        <input type="text" name="username" required autofocus
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm">
      </div>
      <button type="submit"
              class="w-full py-2 px-4 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg transition text-sm">
        Se connecter
      </button>
    </form>
  </div>
</body>
</html>
